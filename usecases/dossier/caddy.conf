# Caddy snippet — add to your main Caddyfile or use as a named snippet
# Access via Tailscale: http://127.0.0.1:5051

# Option A: direct port access (no Caddy needed for Tailscale-only use)
# Just run the app and access http://127.0.0.1:5051

# Option B: reverse proxy with a hostname
# dossier.example.com {
#   reverse_proxy localhost:5051
# }

# Option C: serve on a subpath of existing Caddy config
# handle /dossier/* {
#   uri strip_prefix /dossier
#   reverse_proxy localhost:5051
# }
