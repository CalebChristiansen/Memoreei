# Add this block to your Caddyfile to serve Movie Ring
# Accessible at http://localhost:5050 on Tailscale, or via Caddy subdomain

# Option A: subdomain (requires DNS)
# moviering.example.com {
#     reverse_proxy localhost:5050
# }

# Option B: path prefix on existing domain
# Add inside your existing example.com block:
#
# handle /moviering* {
#     reverse_proxy localhost:5050
# }

# Option C: Tailscale-only (no public exposure) — simplest for demo
# The app binds to 0.0.0.0:5050, so it's directly reachable at:
#   http://127.0.0.1:5050
# No Caddy config needed for this option.
